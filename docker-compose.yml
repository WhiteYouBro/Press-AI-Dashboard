services:
  postgres:
    image: postgres:15-alpine
    env_file: ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "2932:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "6345:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --reload

  celery_worker:
    build: ./backend
    env_file: ./backend/.env
    command: celery -A core worker -l info -Q default -c 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery_beat:
    build: ./backend
    env_file: ./backend/.env
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "COREPACK_ENABLE_DOWNLOAD_PROMPT=0 corepack enable && COREPACK_ENABLE_DOWNLOAD_PROMPT=0 pnpm install --frozen-lockfile --ignore-scripts && pnpm dev --hostname 0.0.0.0"
    ports:
      - "1903:3000"
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NEXT_PUBLIC_API_URL: http://localhost:6345/api/v1
      API_INTERNAL_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules

  telegram_bot:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    env_file: ./backend/.env
    environment:
      BACKEND_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./telegram-bot:/app
      - telegram_bot_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
  telegram_bot_node_modules:
